spring.application.name=auth-service
server.port=8085

spring.datasource.url=jdbc:sqlserver://localhost;instanceName=SQLEXPRESS02;databaseName=authdb;integratedSecurity=true;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=mySecretKey12345678901234567890123456789012
jwt.expiration=86400000
logging.level.org.springframework.security=DEBUG
server.error.include-message=always
server.error.includeserver.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true-stacktrace=always