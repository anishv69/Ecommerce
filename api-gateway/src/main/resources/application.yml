server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**
            - id: cart-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/cart/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE